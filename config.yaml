# HPC Agent Configuration

local:
  # SQLite database
  sqlite_path: "tasks.db"
  
  # Queue monitor settings
  batch_size: 5
  max_retries: 3
  max_parallel_jobs: 4
  poll_interval: 10
  
  # Logging
  log_file: "monitor.log"
  
  # Batch dispatch settings
  batch:
    # Minimum pending tasks before auto-dispatch
    min_pending: 10
    # Accumulate at most this many tasks per batch
    max_batch: 200
    # Model for HPC inference
    model: "deepseek-ai/DeepSeek-V4-Flash"

hpc:
  # SSH connection
  user: "jlam"
  host: "hpc-login.u-strasbg.fr"
  dir: "~/hpc-agent"
  
  # Redis (local on compute node)
  redis_port: 6379
  
  # Model settings (legacy — use dsv4_batch.slurm for DS V4 Flash)
  model: "TinyLlama/TinyLlama-1.1B-Chat-v1.0"
  gpu_memory_utilization: 0.85
  max_model_len: 2048
  
  # DS V4 Flash batch settings
  dsv4:
    # Partition with competitive queue times
    partition: "pri2021gpu"
    account: "qosmivgpu"
    qos: "preemptqos"
    # vLLM settings
    tensor_parallel: 4
    gpu_memory_utilization: 0.92
    max_model_len: 4096
    kv_cache_dtype: "fp8"
    # Job time (12h timeout, occupies H100 80GB)
    time_limit: "12:00:00"
    mem: "128G"
    gres: "gpu:4"
    # Model
    model: "deepseek-ai/DeepSeek-V4-Flash"
  
  # Slurm settings (used by hpc_batch.py dispatch)
  partition: "pri2021gpu"
  account: "qosmivgpu"
  qos: "preemptqos"
  time_limit: "06:00:00"
  mem: "128G"

# ── Collectors ────────────────────────────────────────────────────────────
collectors:
  arxiv:
    cache_ttl: 3600            # 1 hour cache for arXiv queries
    max_results: 50
    rate_limit: 3               # requests per second
  github:
    cache_ttl: 300              # repos change, cache only 5 min
    rate_limit: 30
    token_env: GITHUB_TOKEN     # optional, for higher API rate limits
    max_file_size: 512000       # skip files larger than this
    clone_depth: 1              # shallow clone
  kaggle:
    cache_ttl: 86400            # competitions change rarely
    rate_limit: 5
    token_env: KAGGLE_TOKEN
  web:
    cache_ttl: 0                # never cache web searches by default
    rate_limit: 10
    user_agent: "hpc-agent-research/1.0"
    search_provider: duckduckgo
    playwright: false

# ── Fetch Proxy ──────────────────────────────────────────────────────────
proxy:
  poll_interval: 5              # seconds
  request_timeout: 30           # default timeout for HTTP requests
  max_response_size: 5242880    # 5 MB
  allowlist: ["https://*"]      # URL patterns to allow
  heartbeat_interval: 10        # seconds
  stale_request_cleanup: 600    # 10 min cleanup
  hpc_dir: "~/hpc-agent"

# ── Task Routing ─────────────────────────────────────────────────────────
routing:
  default: "hpc"
  local_models: ["qwen2.5:0.5b", "llama3.2:1b", "tinyllama:1.1b"]
  local_types: ["summarize", "extract_keywords", "classify"]
  hpc_types: ["paper_analysis", "code_review", "comparison", "repo_analysis"]
  context_threshold: 2000       # tokens, below this = candidate for local

# ── Fill Tasks (background work for idle GPU cycles) ────────────────────
fill_tasks:
  enabled: true
  max_per_job: 50                # cap fill tasks per SLURM job
  generators:
    - collector: arxiv
      priority: -1
      params:
        query: "cat:cs.AI OR cat:cs.CL OR cat:cs.LG"
        max_results: 10
      tasks:
        - type: paper_analysis
          tags: ["fill", "background"]
    - echo: true                   # re-run failed tasks at low priority
      priority: -2

# ── Cleanup ──────────────────────────────────────────────────────────────
cleanup:
  # Days to keep old tasks
  completed_days: 30
  failed_days: 7
  
  # Days to keep HPC results
  hpc_results_days: 7
  proxy_files_days: 7           # clean proxy request/response files
  cache_entries_days: 30        # clean collector cache